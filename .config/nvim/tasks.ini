# config file for Plugin asynctasks.vim

[file-build]
# macros in the "$(...)" form will be substituted, 
# shell command, use quotation for filenames containing spaces
command:c,cpp=gcc -O2 -Wall "$(VIM_FILEPATH)" -o "$(VIM_PATHNOEXT)" -lstdc++ -lm -msse3
command:go=go build -o "$(VIM_PATHNOEXT)" "$(VIM_FILEPATH)"
command:make=make -f "$(VIM_FILEPATH)"
output=quickfix
cwd=$(VIM_FILEDIR)
save=2

[file-macro]
command:c,cpp=clangme.py --file "$(VIM_FILEPATH)" --out "$(VIM_PATHNOEXT).i"
output=quickfix
cwd=$(VIM_ROOT)
save=2

[file-run]
command="$(VIM_FILEPATH)"
command:c,cpp="$(VIM_PATHNOEXT)"
command:go="$(VIM_PATHNOEXT)"
command:python=python "$(VIM_FILENAME)"
command:javascript=node "$(VIM_FILENAME)"
command:sh=sh "$(VIM_FILENAME)"
command:lua=lua "$(VIM_FILENAME)"
command:perl=perl "$(VIM_FILENAME)"
command:ruby=ruby "$(VIM_FILENAME)"
output=terminal
cwd=$(VIM_FILEDIR)
save=2

[project-build]
command=make
# set the working directory to the project root.
cwd=$(VIM_ROOT)

[project-run]
command=make run
# <root> is an alias to `$(VIM_ROOT)`, a little easier to type.
cwd=<root>
output=terminal


# :AsyncTask task1 release|debug
[task1:release]
command=gcc -O2 "$(VIM_FILEPATH)" -o "$(VIM_PATHNOEXT)"
cwd=$(VIM_FILEDIR)

[task1:debug]
command=gcc -g "$(VIM_FILEPATH)" -o "$(VIM_PATHNOEXT)"
cwd=$(VIM_FILEDIR)


# This is documents
[task2]
# This is document2
# This is document3
# This is document4
command=echo default
command/win32=echo win32 default
command/linux=echo linux default
# more documnts here
command:c,cpp/win32=echo c/c++ for win32
command:c,cpp/linux=echo c/c++ for linux


# :AsyncTask grep
[grep]
command=rg -n --no-heading --color never "$(?keyword)" "<root>" -tcpp -tc -tpy -tvim -tgo -tasm
cwd=$(VIM_ROOT)
errorformat=%f:%l:%m


[tag4one]
command=tag4one
command:c,cpp="$(VIM_PATHNOEXT)"
command:log=tag4one -f $(VIM_FILETYPE)  $(VIM_FILEPATH)
errorformat=:%l:%m
cwd=$(VIM_ROOT)


[tag4one-term]
command=tag4one
command:c,cpp="$(VIM_PATHNOEXT)"
command:log=tag4one -f $(VIM_FILETYPE)  $(VIM_FILEPATH)
errorformat=:%l:%m
output=terminal
cwd=$(VIM_ROOT)


# :AsyncTask check
[wad]
command=make -i -s -j6 -C daemon/wad 2>&1 | grep -v "fos-web-rules-taskgroups" | grep -v "No such file or directory"
cwd=$(VIM_ROOT)


# :AsyncTask check
[sysinit]
command=make -i -s -j6 -C sysinit 2>&1 | grep -v "fos-web-rules-taskgroups"
cwd=$(VIM_ROOT)

[gitclean-dryrun]
command=git clean -n -fdx
cwd=$(VIM_ROOT)

[gitclean]
command=git clean -fdx
cwd=$(VIM_ROOT)

[chrome-debug]
command=powershell -NoExit -Command "& 'C:\Program Files\Google\Chrome\Application\chrome.exe' --remote-debugging-port=9222 --remote-debugging-address=127.0.0.1 --user-data-dir="$env:TEMP\chrome-debug" --disable-extensions"
output=terminal

# Apply patch to current file's directory
# Usage: :AsyncTask patchit
# - Stashes uncommitted changes if any exist
# - Applies patch with -p1, trying to apply as much as possible
[patchit]
command=\
  (git status --porcelain | grep -qv '??') && git stash push -m "patchit: pre-patch stash" || true; \
  patch -p1 --dry-run < "$(VIM_FILEPATH)" 2>&1; \
  patch -p1 --verbose < "$(VIM_FILEPATH)" 2>&1 || patch -p1 --verbose < "$(VIM_FILEPATH)" --batch || true; \
  git stash list | grep "patchit: pre-patch stash" && echo "# Restore with: git stash pop" || true
cwd=$(VIM_ROOT)

